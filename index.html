<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiabetaCheck — Early Risk Screening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-icon">☀️</span>
  </button>

  <!-- Progress Bar -->
  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <main class="app">

    <!-- Hero / Intro -->
    <section class="screen active" id="screen-intro">
      <div class="intro-content">
        <div class="logo-mark">⬡</div>
        <h1 class="hero-title">Diabeta<em>Check</em></h1>
        <p class="hero-sub">A symptom-based early diabetes risk screener. No blood tests. No lab visits. Just honest answers.</p>
        <p class="hero-note">Takes about 2 minutes · 16 questions · 4 ML models</p>

        <div class="model-select-wrap">
          <label class="model-label">Choose a prediction model</label>
          <div class="model-grid">
            <button class="model-btn" data-model="random_forest">
              <span class="model-name">Random Forest</span>
              <span class="model-acc">98.08%</span>
            </button>
            <button class="model-btn" data-model="decision_tree">
              <span class="model-name">Decision Tree</span>
              <span class="model-acc">96.15%</span>
            </button>
            <button class="model-btn" data-model="logistic_regression">
              <span class="model-name">Logistic Regression</span>
              <span class="model-acc">93.08%</span>
            </button>
            <button class="model-btn" data-model="naive_bayes">
              <span class="model-name">Naive Bayes</span>
              <span class="model-acc">88.08%</span>
            </button>
          </div>
          <p class="model-hint" id="modelHint">Select a model to continue</p>
        </div>

        <button class="btn-primary" id="startBtn" disabled>Begin Screening →</button>
        <p class="disclaimer">⚠️ This tool is for informational purposes only and does not replace professional medical advice.</p>
      </div>
    </section>

    <!-- Question Screens (generated by JS) -->
    <div id="questionScreens"></div>

    <!-- Result Screen -->
    <section class="screen" id="screen-result">
      <div class="result-content">
        <div class="result-badge" id="resultBadge"></div>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-model" id="resultModel"></p>
        <div class="result-advice" id="resultAdvice"></div>
        <div class="result-actions">
          <button class="btn-primary" id="restartBtn">Start Over</button>
          <button class="btn-secondary" id="changeModelBtn">Try Another Model</button>
        </div>
      </div>
    </section>

  </main>

  <!-- Tooltip Overlay -->
  <div class="tooltip-overlay" id="tooltipOverlay">
    <div class="tooltip-box">
      <button class="tooltip-close" id="tooltipClose">✕</button>
      <h3 class="tooltip-title" id="tooltipTitle"></h3>
      <p class="tooltip-body" id="tooltipBody"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
